<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>サイネージ動画ループ再生</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }
  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }
</style>
</head>
<body>

<!-- 1. HTML側は muted をつけて自動再生ブロックを確実に回避します -->
<video id="mv" autoplay muted playsinline>
  <!-- ※ 新しく作った「無音トラック付き」の動画URLに差し替えてください -->
  <source src="https://sjemoqtzujrsezbkfwsm.supabase.co/storage/v1/object/public/signage-video/20260707(2).mp4" type="video/mp4">
</video>

<script>
  const v = document.getElementById('mv');

  // 2. 【新規】動画が再生開始されたらミュートを解除し、音量を極小にします。
  // 音声トラックが流れることで、Vega OSに「メディア再生中」と認識させ、スリープを防止します。
  v.addEventListener('play', () => {
    v.muted = false;
    v.volume = 0.001; 
  }, { once: true }); // 最初の再生時に1回だけ実行

  // Fire TV Silk のループ停止対策（既存の確実な方法を維持）
  v.addEventListener('ended', () => {
    v.load();            
    v.currentTime = 0;
    v.play();
  });

  // 万が一動画が停止した場合の定期チェック（既存）
  setInterval(() => {
    if (v.paused || v.readyState < 2) {
      v.play();
    }
  }, 4000);

  // 画面のタブ切り替えや非表示から戻ったときの対策（既存）
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      v.play();
    }
  });

  // 初回読み込み時の対策（既存）
  window.addEventListener('load', () => {
    v.play();
  });

  // 3. 【削除】5分の強制リロード（location.reload）は、最初に戻る原因のため削除しました。

  // 4. Vega OS 最終対策：偽のマウス移動（念のため維持）
  setInterval(function() {
    const fakeMove = new MouseEvent('mousemove', {
        clientX: 1,
        clientY: 1
    });
    document.dispatchEvent(fakeMove);
  }, 30000);

</script>

</body>
</html>
