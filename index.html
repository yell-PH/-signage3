<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>サイネージ動画ループ再生</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }
  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }
</style>
</head>
<body>

<video id="mv" autoplay muted playsinline loop>
  <source src="https://sjemoqtzujrsezbkfwsm.supabase.co/storage/v1/object/public/signage-video/20260707(2).mp4" type="video/mp4">
</video>

<script>
  const v = document.getElementById('mv');

  // ✨ 改良：重い v.load() を廃止し、秒数を戻して即座に再生する滑らかなループ処理
  v.addEventListener('ended', () => {
    v.currentTime = 0;
    v.play().catch(err => {
      console.error("ループ再生に失敗しました。再読み込みします:", err);
      v.load();
      v.play();
    });
  });

  // 万が一動画が途中で停止した場合の定期チェック（既存）
  setInterval(() => {
    if (v.paused || v.readyState < 2) {
      v.play();
    }
  }, 4000);

  // タブの切り替えや画面が戻ってきたときの対策（既存）
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      v.play();
    }
  });

  // 初回読み込み時の対策（既存）
  window.addEventListener('load', () => {
    v.play();
  });

  // Vega OS 最終対策：偽のマウス移動（既存）
  setInterval(function() {
    const fakeMove = new MouseEvent('mousemove', {
        clientX: 1,
        clientY: 1
    });
    document.dispatchEvent(fakeMove);
  }, 30000);


  // 🚨 10分スリープを絶対に阻止する「8分強制リロード」
  // 動画が6分なので、1ループ目が終わり、2ループ目の途中（合計8分）でページがリフレッシュされます。
  // これでOSのスリープタイマーを確実に壊します。
  setTimeout(function() {
    location.reload();
  }, 480000); // 480,000ms = 8分

</script>

</body>
</html>
