<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>サイネージ動画ループ再生</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }
  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }
</style>
</head>
<body>

<!-- HTML側は完全に muted のまま固定し、自動再生を絶対に成功させます -->
<video id="mv" autoplay muted playsinline>
  <source src="https://sjemoqtzujrsezbkfwsm.supabase.co/storage/v1/object/public/signage-video/20260707(2).mp4" type="video/mp4">
</video>

<script>
  const v = document.getElementById('mv');
  let wakeLock = null;

  // 【新規】画面のスリープ（消灯・一時停止）を強制的に防止する関数
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
        console.log('Wake Lock が有効になりました。スリープを防止します。');
      }
    } catch (err) {
      console.error('Wake Lock の起動に失敗しました:', err);
    }
  }

  // 動画の再生が始まったら、スリープ防止機能を起動する
  v.addEventListener('play', () => {
    requestWakeLock();
  });

  // Fire TV Silk のループ停止対策（既存）
  v.addEventListener('ended', () => {
    v.load();            
    v.currentTime = 0;
    v.play();
  });

  // 万が一動画が停止した場合の定期チェック（既存）
  setInterval(() => {
    if (v.paused || v.readyState < 2) {
      v.play();
    }
  }, 4000);

  // タブの切り替えや画面が戻ってきたときの対策（既存）
  document.addEventListener('visibilitychange', async () => {
    if (!document.hidden) {
      v.play();
      await requestWakeLock(); // 画面が戻ったらスリープ防止を再要求
    }
  });

  // 初回読み込み時の対策（既存）
  window.addEventListener('load', () => {
    v.play();
  });

  // Vega OS 最終対策：偽のマウス移動（既存）
  setInterval(function() {
    const fakeMove = new MouseEvent('mousemove', {
        clientX: 1,
        clientY: 1
    });
    document.dispatchEvent(fakeMove);
  }, 30000);

</script>

</body>
</html>
