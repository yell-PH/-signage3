<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>サイネージ動画ループ再生</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }
  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }
</style>
</head>
<body>

<video id="mv" autoplay muted playsinline>
  <source src="https://sjemoqtzujrsezbkfwsm.supabase.co/storage/v1/object/public/signage-video/20260707(2).mp4" type="video/mp4">
</video>

<script>
  const v = document.getElementById('mv');

  // Fire TV Silk のループ停止対策（最重要）
  v.addEventListener('ended', () => {
    v.load();            // Silk のキャッシュ切れを防ぐ
    v.currentTime = 0;
    v.play();
  });

  // Fire OS / Vega OS の省電力で動画が停止するのを防ぐ
  setInterval(() => {
    if (v.paused || v.readyState < 2) {
      v.play();
    }
  }, 4000);

  // 自動再生がブロックされた場合の対策
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      v.play();
    }
  });

  // 初回読み込みが遅れた場合の対策
  window.addEventListener('load', () => {
    v.play();
  });

  // ★ 対策①：5分ごとにページをリロードしてメモリをクリア（Vega OS対策）
  setTimeout(function() {
    location.reload();
  }, 300000); // 300,000ms = 5分

  // ★ Vega OS 最終対策：30秒ごとに偽のマウス移動イベントを送る
  setInterval(function() {
    const fakeMove = new MouseEvent('mousemove', {
        clientX: 1,
        clientY: 1
    });
    document.dispatchEvent(fakeMove);
  }, 30000); // 30秒


</script>

</body>
</html>
