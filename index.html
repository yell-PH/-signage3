<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>サイネージ動画ループ再生</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }
  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }
</style>
</head>
<body>

<video id="mv" autoplay muted playsinline loop>
  <source src="https://sjemoqtzujrsezbkfwsm.supabase.co/storage/v1/object/public/signage-video/20260707(2).mp4" type="video/mp4">
</video>

<script>
  const v = document.getElementById('mv');

  // 動画のループ処理
  v.addEventListener('ended', () => {
    v.currentTime = 0;
    v.play().catch(err => {
      console.error("再生失敗:", err);
      v.load();
      v.play();
    });
  });

  // 定期再生チェック
  setInterval(() => {
    if (v.paused || v.readyState < 2) {
      v.play();
    }
  }, 4000);

  window.addEventListener('load', () => { v.play(); });

  // 🚨【大本命の対策】1分ごとに「画面をタッチした信号」を発生させる
  setInterval(function() {
    // 画面の中央（X: 100, Y: 100の位置）をタッチしたという本物のイベントを作成
    const touch = new Touch({
      identifier: Date.now(),
      target: document.body,
      clientX: 100,
      clientY: 100,
      screenX: 100,
      screenY: 100,
      pageX: 100,
      pageY: 100
    });

    const touchStartEvent = new TouchEvent('touchstart', {
      touches: [touch],
      targetTouches: [touch],
      changedTouches: [touch],
      bubbles: true,
      cancelable: true
    });

    const touchEndEvent = new TouchEvent('touchend', {
      touches: [],
      targetTouches: [],
      changedTouches: [touch],
      bubbles: true,
      cancelable: true
    });

    // 画面にタッチ信号を送り込む
    document.body.dispatchEvent(touchStartEvent);
    setTimeout(() => {
      document.body.dispatchEvent(touchEndEvent);
    }, 100);

    console.log("OSの目を盗んで画面をタッチしました");
  }, 60000); // 1分（60,000ms）ごとに実行

</script>

</body>
</html>
