<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>サイネージ動画ループ再生</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }
  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }
</style>
</head>
<body>

<video id="mv" autoplay muted playsinline loop>
  <source src="https://sjemoqtzujrsezbkfwsm.supabase.co/storage/v1/object/public/signage-video/20260707(2).mp4" type="video/mp4">
</video>

<script>
  const v = document.getElementById('mv');

  // 動画のループ処理（既存の滑らかな方法）
  v.addEventListener('ended', () => {
    v.currentTime = 0;
    v.play().catch(err => {
      console.error("ループ再生に失敗しました:", err);
      v.load();
      v.play();
    });
  });

  // 定期再生チェック（既存）
  setInterval(() => {
    if (v.paused || v.readyState < 2) {
      v.play();
    }
  }, 4000);

  // 初回読み込み時の対策（既存）
  window.addEventListener('load', () => {
    v.play();
  });


  // 🚨 【今回の超最終対策】8分ごとにURLを完全に変えて「別のページ」へ遷移する
  // location.reload() ではなく、URLの末尾に毎回違う数字（タイムスタンプ）を強制的に付与してジャンプします。
  // これにより、OSに「ユーザーが新しい別のウェブサイトに移動した」と認識させ、10分タイマーを強制リセットします。
  setTimeout(function() {
    const currentUrl = window.location.protocol + '//' + window.location.host + window.location.pathname;
    // 新しいURL（例: mysignage.html?t=17123456789）を作って完全に遷移
    window.location.href = currentUrl + '?t=' + new Date().getTime();
  }, 480000); // 480,000ms = 8分

</script>

</body>
</html>
